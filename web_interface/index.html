<html lang="ru"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#050a1b">
<title>Cicada3301 • Deauther</title>
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<style>
    :root {
        --black: #050a1b;
        --void: #050a1b;
        --gold: #d4af37;
        --gold-bright: #f0d078;
        --gold-dim: #8a7340;
        --ice: #00f0ff;
        --ice-dim: rgba(0, 240, 255, 0.35);
        --white: #f4f6ff;
        --muted: #9aa8d8;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html,
    body {
        width: 100%;
        height: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
        background:
            radial-gradient(900px 500px at 12% -8%, rgba(34, 85, 255, 0.22) 0%, transparent 58%),
            radial-gradient(760px 420px at 92% 6%, rgba(122, 92, 255, 0.20) 0%, transparent 55%),
            linear-gradient(180deg, #050a1b 0%, #070b22 42%, #050a1b 100%);
        color: var(--white);
        font-family: 'JetBrains Mono', monospace;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
    }

    #starsBg {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
    }

    .bg-glow {
        position: fixed;
        inset: -20vh -20vw;
        z-index: 0;
        pointer-events: none;
        background:
            radial-gradient(closest-side at 20% 25%, rgba(0,240,255,0.14) 0%, transparent 68%),
            radial-gradient(closest-side at 78% 28%, rgba(122,92,255,0.16) 0%, transparent 70%);
        animation: bgFloat 14s ease-in-out infinite;
    }

    @keyframes bgFloat {
        0%, 100% { opacity: 0.85; }
        50% { opacity: 1; }
    }

    .splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        z-index: 2;
    }

    .splash.fade-out {
        animation: exit 0.9s cubic-bezier(0.4, 0, 1, 1) forwards;
    }

    @keyframes exit {
        to {
            opacity: 0;
            filter: blur(12px);
        }
    }

    /* мягкая виньетка — только по краям */
    .vignette {
        pointer-events: none;
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse 70% 65% at 50% 48%, transparent 0%, rgba(0, 0, 0, 0.4) 70%, #000 100%);
        z-index: 5;
    }

    /* тонкое свечение в центре */
    .glow-orb {
        pointer-events: none;
        position: fixed;
        width: min(520px, 90vw);
        height: min(520px, 90vw);
        left: 50%;
        top: 44%;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(126, 232, 255, 0.07) 0%, rgba(201, 169, 98, 0.04) 35%, transparent 68%);
        animation: orbPulse 4s ease-in-out infinite;
        z-index: 1;
    }

    @keyframes orbPulse {

        0%,
        100% {
            opacity: 0.7;
            transform: translate(-50%, -50%) scale(1);
        }

        50% {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.06);
        }
    }

    .noise {
        pointer-events: none;
        position: fixed;
        inset: 0;
        opacity: 0.045;
        z-index: 6;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .stars {
        pointer-events: none;
        position: fixed;
        inset: 0;
        z-index: 0;
    }

    .star {
        position: absolute;
        background: #fff;
        border-radius: 50%;
        opacity: 0;
        animation: twinkle 3s ease-in-out infinite;
    }

    @keyframes twinkle {

        0%,
        100% {
            opacity: 0.15;
        }

        50% {
            opacity: 0.7;
        }
    }

    .frame {
        position: relative;
        z-index: 4;
        text-align: center;
        padding: 2rem 1.5rem;
        padding-top: max(1.5rem, env(safe-area-inset-top));
        padding-left: max(1rem, env(safe-area-inset-left));
        padding-right: max(1rem, env(safe-area-inset-right));
        max-width: 100%;
        width: 100%;
        animation: frameIn 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
    }

    @keyframes frameIn {
        to {
            opacity: 1;
        }
    }

    /* SVG-эмблема */
    .emblem {
        width: min(200px, 52vw);
        height: min(200px, 52vw);
        margin: 0 auto 2rem;
        position: relative;
        opacity: 0;
        animation: emblemIn 1.6s cubic-bezier(0.16, 1, 0.3, 1) 0.25s forwards,
            emblemFloat 5s ease-in-out 1.9s infinite;
    }

    @keyframes emblemIn {
        from {
            opacity: 0;
            transform: translateY(20px) scale(0.92);
            filter: blur(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0) scale(1);
            filter: blur(0);
        }
    }

    @keyframes emblemFloat {

        0%,
        100% {
            transform: translateY(0);
        }

        50% {
            transform: translateY(-8px);
        }
    }

    .emblem svg {
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 0 24px rgba(126, 232, 255, 0.25)) drop-shadow(0 0 48px rgba(201, 169, 98, 0.15));
    }

    .ring-svg {
        position: absolute;
        inset: -12%;
        animation: spinSlow 20s linear infinite;
    }

    .ring-svg.rev {
        animation-direction: reverse;
        animation-duration: 14s;
    }

    @keyframes spinSlow {
        to {
            transform: rotate(360deg);
        }
    }

    .ornament {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        margin-bottom: 1.2rem;
        opacity: 0;
        animation: lineIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
    }

    .ornament-line {
        height: 1px;
        width: min(80px, 18vw);
        background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }

    .ornament-diamond {
        width: 6px;
        height: 6px;
        background: var(--gold);
        transform: rotate(45deg);
        box-shadow: 0 0 12px var(--gold);
    }

    @keyframes lineIn {
        from {
            opacity: 0;
            transform: scaleX(0.3);
        }

        to {
            opacity: 1;
            transform: scaleX(1);
        }
    }

    .title {
        font-family: 'Cinzel', 'Orbitron', serif;
        font-weight: 700;
        font-size: clamp(1.15rem, 5vw, 1.85rem);
        letter-spacing: 0.12em;
        line-height: 1.35;
        position: relative;
        max-width: 100%;
        width: 100%;
        padding: 0 0.25rem;
        margin: 0 auto;
    }

    .title-spin-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 4rem;
        margin: 0 auto;
        opacity: 0;
        perspective: 1000px;
        perspective-origin: 50% 50%;
        animation: titleReveal 1.5s cubic-bezier(0.16, 1, 0.3, 1) 1.15s forwards;
    }

    .title-spin-wrap.spin-active .title-spin-text {
        animation: titleSpinMeridian 20s linear infinite, goldShimmer 5s ease-in-out infinite;
    }

    .title-spin-wrap.spin-active .title-spin-text:nth-child(2) {
        animation: titleSpinMeridian2 20s linear infinite, goldShimmer 5s ease-in-out infinite;
        position: absolute;
    }

    .title-spin-text {
        display: inline-block;
        transform-origin: center center;
        transform-style: preserve-3d;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        white-space: nowrap;
        padding: 0.2rem 0.5rem;
        will-change: transform;
        background: linear-gradient(105deg, var(--gold-dim) 0%, var(--gold-bright) 35%, var(--gold) 50%, var(--gold-bright) 65%, var(--gold-dim) 100%);
        background-size: 220% auto;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.5)) drop-shadow(0 0 40px rgba(201, 169, 98, 0.28));
    }

    .title-spin-short {
        display: none;
    }

    /* Вращение по меридиану — вокруг вертикальной оси (как глобус), не в плоскости экрана */
    @keyframes titleSpinMeridian {
        from { transform: rotateY(0deg); }
        to   { transform: rotateY(360deg); }
    }

    @keyframes titleSpinMeridian2 {
        from { transform: rotateY(180deg); }
        to   { transform: rotateY(540deg); }
    }

    @keyframes titleReveal {
        from {
            opacity: 0;
            transform: translateY(18px);
            filter: blur(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
            filter: blur(0);
        }
    }

    @keyframes goldShimmer {
        0%, 100% {
            background-position: 0% center;
        }

        50% {
            background-position: 100% center;
        }
    }

    .subtitle {
        margin-top: 1.6rem;
        font-family: 'Orbitron', sans-serif;
        font-weight: 400;
        font-size: clamp(0.65rem, 2.8vw, 0.82rem);
        letter-spacing: 0.55em;
        text-transform: uppercase;
        color: var(--muted);
        animation: subUp 0.9s ease 0.85s both;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 0.35rem 0.6rem;
        max-width: 100%;
    }

    .subtitle .hl {
        color: var(--ice);
        letter-spacing: 0.4em;
        text-shadow: 0 0 16px rgba(126, 232, 255, 0.5);
    }

    .subtitle .dot {
        color: var(--gold);
        margin: 0 0.35em;
        text-shadow: 0 0 8px var(--gold);
    }

    @keyframes subUp {
        from {
            opacity: 0;
            transform: translateY(12px);
            letter-spacing: 0.7em;
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .progress-area {
        position: fixed;
        bottom: max(1.25rem, env(safe-area-inset-bottom));
        left: 0;
        right: 0;
        margin-left: auto;
        margin-right: auto;
        width: min(300px, calc(100vw - 2rem));
        z-index: 7;
        animation: subUp 1s cubic-bezier(0.16, 1, 0.3, 1) 1.85s both;
        padding: 0 1rem;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    .progress-labels {
        width: 100%;
        max-width: 300px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    .progress-track {
        width: 100%;
        max-width: 280px;
        height: 1px;
        background: rgba(255, 255, 255, 0.08);
        position: relative;
        overflow: visible;
        margin: 0 auto;
    }

    .progress-glow {
        position: absolute;
        top: -1px;
        left: 0;
        height: 3px;
        width: 0;
        background: linear-gradient(90deg, var(--gold-dim), var(--ice), var(--gold));
        box-shadow: 0 0 20px var(--ice), 0 0 40px rgba(201, 169, 98, 0.4);
        animation: progress 3.2s cubic-bezier(0.4, 0, 0.2, 1) 0.4s forwards;
    }

    @keyframes progress {
        to {
            width: 100%;
        }
    }

    .progress-dot {
        position: absolute;
        right: 0;
        top: 50%;
        width: 5px;
        height: 5px;
        background: var(--ice);
        border-radius: 50%;
        transform: translate(50%, -50%) scale(0);
        box-shadow: 0 0 12px var(--ice);
        animation: dotPop 0.4s cubic-bezier(0.16, 1, 0.3, 1) 4.85s forwards;
    }

    @keyframes dotPop {
        to {
            transform: translate(50%, -50%) scale(1);
        }
    }

    .hint {
        margin-top: 1rem;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.62rem;
        font-weight: 300;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #3a3a42;
        text-align: center;
        width: 100%;
        line-height: 1.5;
        overflow-wrap: break-word;
        word-break: break-word;
    }

    .skip-hint {
        margin-top: 0.45rem;
        font-size: 0.55rem;
        letter-spacing: 0.06em;
        color: #4a4a55;
        text-align: center;
        width: 100%;
    }

    .skip-short {
        display: none;
    }

    .start-btn {
        display: inline-block;
        margin-top: 1.25rem;
        padding: 0.85rem 2.2rem;
        font-family: 'Orbitron', sans-serif;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        text-decoration: none;
        color: var(--void);
        background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dim) 100%);
        border: 1px solid rgba(201, 169, 98, 0.6);
        border-radius: 4px;
        box-shadow: 0 0 24px rgba(201, 169, 98, 0.35), 0 4px 20px rgba(0, 0, 0, 0.4);
        opacity: 0;
        transform: translateY(12px);
        pointer-events: none;
        transition: opacity 0.5s ease, transform 0.5s ease, box-shadow 0.25s ease;
    }

    .start-btn.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
        animation: startPulse 2.5s ease-in-out infinite;
    }

    .start-btn.visible:hover,
    .start-btn.visible:focus {
        box-shadow: 0 0 32px rgba(110, 231, 255, 0.45), 0 0 20px rgba(201, 169, 98, 0.5);
        outline: none;
    }

    @keyframes startPulse {

        0%,
        100% {
            box-shadow: 0 0 24px rgba(201, 169, 98, 0.35), 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        50% {
            box-shadow: 0 0 36px rgba(110, 231, 255, 0.4), 0 4px 24px rgba(0, 0, 0, 0.45);
        }
    }

    @media (min-width: 769px) {
        .skip-hint {
            display: none;
        }
    }

    .scan-bar {
        pointer-events: none;
        position: fixed;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--ice), transparent);
        opacity: 0;
        z-index: 8;
        animation: scanMove 2.5s ease-in-out 0.6s infinite;
    }

    @keyframes scanMove {
        0% {
            top: 15%;
            opacity: 0;
        }

        10% {
            opacity: 0.35;
        }

        90% {
            opacity: 0.35;
        }

        100% {
            top: 85%;
            opacity: 0;
        }
    }

    /* ——— Мобильные ——— */
    @media (max-width: 768px) {
        .glow-orb {
            width: 100vw;
            height: 100vw;
            top: 42%;
        }

        .emblem {
            width: min(168px, 58vw);
            height: min(168px, 58vw);
            margin-bottom: 1.35rem;
        }

        .frame {
            padding-top: max(2.5rem, env(safe-area-inset-top));
            padding-bottom: 5.5rem;
        }

        .ornament {
            gap: 0.55rem;
            margin-bottom: 0.85rem;
        }

        .ornament-line {
            width: min(48px, 14vw);
        }

        .title-spin-full {
            display: none;
        }

        .title-spin-short {
            display: flex;
            font-size: clamp(1.35rem, 7.5vw, 1.75rem);
            letter-spacing: 0.08em;
        }

        .subtitle {
            margin-top: 1rem;
            letter-spacing: 0.22em;
            font-size: 0.72rem;
        }

        .subtitle .hl,
        .subtitle .dot,
        .subtitle .sub-esp {
            letter-spacing: 0.18em;
        }

        .progress-area {
            width: min(280px, calc(100vw - 1.5rem));
        }

        .progress-track {
            max-width: 260px;
        }

        .hint {
            font-size: 0.56rem;
            letter-spacing: 0.06em;
            margin-top: 0.75rem;
        }

        .skip-hint {
            letter-spacing: 0.04em;
            font-size: 0.52rem;
        }

        .skip-long {
            display: none;
        }

        .skip-short {
            display: inline;
        }
    }

    @media (max-width: 480px) {
        .emblem {
            width: min(140px, 52vw);
            height: min(140px, 52vw);
            margin-bottom: 1rem;
        }

        @keyframes emblemFloat {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-4px);
            }
        }

        .title-spin-short {
            font-size: clamp(1.2rem, 8vw, 1.5rem);
            letter-spacing: 0.05em;
        }

        .subtitle {
            flex-direction: column;
            gap: 0.25rem;
            letter-spacing: 0.15em;
        }

        .subtitle .dot {
            display: none;
        }

        .progress-area {
            width: min(260px, calc(100vw - 1.25rem));
        }

        .progress-track {
            max-width: 240px;
        }

        .hint {
            font-size: 0.5rem;
            letter-spacing: 0.04em;
        }

        .skip-hint {
            font-size: 0.48rem;
        }
    }

    @media (max-width: 390px) {
        .emblem {
            width: 128px;
            height: 128px;
        }

        .title-spin-short {
            font-size: 1.15rem;
        }

        .subtitle {
            font-size: 0.65rem;
        }

        .frame {
            padding-bottom: 6.5rem;
        }
    }

    @media (prefers-reduced-motion: reduce) {

        .emblem,
        .glow-orb,
        .scan-bar,
        .star,
        .ring-svg,
        .title-spin-text {
            animation: none !important;
        }

        .title-spin-wrap.spin-active .title-spin-text {
            transform: none;
        }

        .splash.fade-out {
            animation-duration: 0.35s;
        }
    }
</style>
</head><body>

<div class="bg-glow"></div>

<script> (function () {
    var TARGET = 'scan';
    var stars = document.getElementById('stars');
    var startBtn = document.getElementById('startBtn');
    var titleSpinFull = document.getElementById('titleSpinFull');
    var titleSpinShort = document.getElementById('titleSpinShort');
    var redirected = false;
    var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function showStartBtn() {
        if (startBtn) startBtn.classList.add('visible');
        var hint = document.querySelector('.progress-labels .hint');
        if (hint) hint.textContent = 'ready';
    }

    function startTitleSpin() {
        if (reduceMotion) return;
        if (titleSpinFull) titleSpinFull.classList.add('spin-active');
        if (titleSpinShort) titleSpinShort.classList.add('spin-active');
    }

    function goTarget() {
        if (redirected) return;
        redirected = true;
        document.getElementById('splash').classList.add('fade-out');
        setTimeout(function () { window.location.href = TARGET; }, 650);
    }

    var starCount = window.matchMedia('(max-width: 480px)').matches ? 32 : 60;
    for (var i = 0; i < starCount; i++) {
        var s = document.createElement('div');
        s.className = 'star';
        var size = Math.random() > 0.92 ? 2 : 1;
        s.style.width = size + 'px';
        s.style.height = size + 'px';
        s.style.left = (Math.random() * 100) + '%';
        s.style.top = (Math.random() * 100) + '%';
        s.style.animationDelay = (Math.random() * 3) + 's';
        s.style.animationDuration = (2 + Math.random() * 4) + 's';
        stars.appendChild(s);
    }

    getFile('settings.json', function (res) {
        try {
            var s = JSON.parse(res);
            if (s.workmode === 1) {
                TARGET = 'repeater';
                if (startBtn) {
                    startBtn.setAttribute('href', TARGET);
                    startBtn.setAttribute('aria-label', 'Продолжить — ретранслятор');
                }
            }
        } catch (e) { }
    }, 5000);

    setTimeout(startTitleSpin, 2700);
    setTimeout(showStartBtn, 5000);

    if (startBtn) {
        startBtn.addEventListener('click', function (e) {
            e.preventDefault();
            goTarget();
        });
    }
})(); </script>
